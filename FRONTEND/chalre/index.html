<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="1080x1080" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://chalre.in/" />

    <!-- Primary SEO -->
    <title>ChalRe – Carpool & Bikepool Rides Near You</title>
    <meta
      name="description"
      content="ChalRe is a local-first carpooling and bikepooling platform for daily commutes and long routes. Share rides, save costs, and travel smarter together."
    />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook Preview) -->
    <meta property="og:title" content="ChalRe – Ride Sharing Platform" />
    <meta property="og:description" content="Find rides, share journeys, and travel smarter with ChalRe." />
    <meta property="og:url" content="https://chalre.in" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://chalre.in/preview.png" />

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ChalRe – Ride Sharing Platform" />
    <meta name="twitter:description" content="Find rides, share journeys, and travel smarter with ChalRe." />
    <meta name="twitter:image" content="https://chalre.in/preview.png" />

    <!-- ✅ JSON-LD: Tells Google exactly which image is your logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ChalRe",
      "url": "https://chalre.in",
      "logo": {
        "@type": "ImageObject",
        "url": "https://chalre.in/favicon.png",
        "width": 1080,
        "height": 1080
      }
    }
    </script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PZVMVQYL68"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PZVMVQYL68');
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
